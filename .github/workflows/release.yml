name: Release

on:
  push:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-release:
    name: Build & Release (Windows)
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Clean previous bundle artifacts
        shell: bash
        run: rm -rf src-tauri/target/release/bundle

      - name: Build Tauri app
        run: pnpm tauri build

      - name: Get version
        id: version
        shell: bash
        run: |
          VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Copy user guide to release artifacts
        shell: bash
        run: cp docs/USER_GUIDE.md src-tauri/target/release/bundle/USER_GUIDE.md

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: KokoroChat v${{ steps.version.outputs.version }}
          body: |
            ## KokoroChat v${{ steps.version.outputs.version }}

            ### 変更点（v0.1.2 → v0.2.0）

            #### 新機能
            - LLM Tool Use (Function Calling) 機能の実装
              - Web検索プラグイン（Tavily / Brave Search対応）
              - 計算機プラグイン
              - ファイル操作プラグイン
              - カスタムツール登録（HTTP Webhook / CLI）
            - プラグイン設定UIの追加（ツール管理タブ）
            - Brave / Tavily APIキーの独立管理

            #### バグ修正
            - TTS設定・アバター削除が保存されないバグを修正
            - プラグイン設定がconfig.jsonに永続化されない問題を修正
            - 一般設定保存時にプラグイン設定が上書き消失する問題を修正
            - アプリ起動時にプラグイン設定がレジストリに復元されない問題を修正

            #### 改善
            - マージワークフローのステアリング整理

            ### ダウンロード

            Windows用インストーラー (.exe) をダウンロードして実行してください。

            ### ドキュメント

            `USER_GUIDE.md` — アプリの使い方ガイド（Google Gemini無料API設定手順を含む）
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/USER_GUIDE.md
          draft: false
          prerelease: false
          make_latest: true
