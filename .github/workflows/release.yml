name: Release

on:
  push:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-release:
    name: Build & Release (Windows)
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Clean previous bundle artifacts
        shell: bash
        run: rm -rf src-tauri/target/release/bundle

      - name: Build Tauri app
        run: pnpm tauri build

      - name: Get version
        id: version
        shell: bash
        run: |
          VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Copy user guide to release artifacts
        shell: bash
        run: cp docs/USER_GUIDE.md src-tauri/target/release/bundle/USER_GUIDE.md

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: KokoroChat v${{ steps.version.outputs.version }}
          body: |
            ## KokoroChat v${{ steps.version.outputs.version }}

            ### 変更点（v0.2.0 → v0.3.0）

            #### 新機能
            - file_ops プラグインの同期的アクセス許可フロー実装
              - ファイル操作時にアクセス権限がない場合、自動的にUIダイアログで許可を求める
              - ユーザーが許可/拒否するまでバックエンドで非同期待機
              - 許可後は自動的にセッションのACLを更新し操作を続行
            - ChatView にオーバーレイ型アクセス許可ダイアログを追加

            #### 改善
            - LLMから見たフローの単純化（request_directory_access ツール廃止）
            - PluginHandler/PluginSystem トレイトに AppHandle を伝搬するリファクタリング

            ### ダウンロード

            Windows用インストーラー (.exe) をダウンロードして実行してください。

            ### ドキュメント

            `USER_GUIDE.md` — アプリの使い方ガイド（Google Gemini無料API設定手順を含む）
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/USER_GUIDE.md
          draft: false
          prerelease: false
          make_latest: true
