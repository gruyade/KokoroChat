name: Release

on:
  push:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-release:
    name: Build & Release (Windows)
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-release-

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Clean previous bundle artifacts
        shell: bash
        run: rm -rf src-tauri/target/release/bundle

      - name: Build Tauri app
        run: pnpm tauri build

      - name: Get version
        id: version
        shell: bash
        run: |
          VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Copy user guide to release artifacts
        shell: bash
        run: cp docs/USER_GUIDE.md src-tauri/target/release/bundle/USER_GUIDE.md

      - name: Create or update release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: v${{ steps.version.outputs.version }}
          commit: ${{ github.sha }}
          name: KokoroChat v${{ steps.version.outputs.version }}
          body: |
            ## KokoroChat v${{ steps.version.outputs.version }}

            ### 変更点（v0.3.0 → v0.4.0）

            #### 新機能
            - Knowledge Plugin 実装 — セッション単位でナレッジファイルを登録・参照可能に
            - Thinking/Reasoning 対応 — LLMの思考プロセスをUI上で表示（Gemini/Claude/OpenAI対応）
            - ツール呼び出しをまたぐメッセージバブル分割 — ツール実行前後でバブルを分離し会話フローを明確化
            - file_ops: AIのファイルアクセス判断フローを最適化

            #### バグ修正
            - tool_reference ナレッジのツール使用誘導を強化
            - build.rs: テストバイナリのDLLロードエラー修正（Common Controls v6マニフェスト）
            - calculator E2Eテストのアサーション修正

            #### 改善
            - file_ops: resolve_path抽出・共通ヘルパーによるexecute簡潔化
            - cargo fmt 適用、ESLint globals追加

            ### ダウンロード

            Windows用インストーラー (.exe) をダウンロードして実行してください。

            ### ドキュメント

            `USER_GUIDE.md` — アプリの使い方ガイド（Google Gemini無料API設定手順を含む）
          artifacts: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/USER_GUIDE.md
          draft: false
          prerelease: false
          makeLatest: true
