repos:
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: |
          (?x)^(
            pnpm-lock\.yaml|
            src-tauri/Cargo\.lock|
            \.env\.example
          )$
